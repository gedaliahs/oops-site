name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run tests
        run: go test ./...

      - name: Build binaries
        run: |
          mkdir -p dist
          for GOOS in darwin linux; do
            for GOARCH in amd64 arm64; do
              echo "Building ${GOOS}/${GOARCH}..."
              GOOS=$GOOS GOARCH=$GOARCH go build -ldflags="-s -w" -o "dist/oops" .
              tar -czf "dist/oops_${GOOS}_${GOARCH}.tar.gz" -C dist oops
              rm dist/oops
            done
          done

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
          generate_release_notes: true
